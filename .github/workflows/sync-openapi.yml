name: Update OpenAPI Spec

on:
  repository_dispatch:
    types: [update-docs]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      SOURCE_REPO: ${{ github.event.client_payload.repo }}
      SOURCE_SHA: ${{ github.event.client_payload.sha }}
      SPEC_PATH: ${{ github.event.client_payload.spec_path }}
      TARGET_PATH: ${{ github.event.client_payload.target_path }}
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      - name: Download OpenAPI spec from source repo
        run: |
          SPEC_PATH="${SPEC_PATH:-openapi.json}"
          TARGET_PATH="${TARGET_PATH:-api-reference/openapi.json}"
          mkdir -p "$(dirname "$TARGET_PATH")"

          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.raw+json" \
            "https://api.github.com/repos/${SOURCE_REPO}/contents/${SPEC_PATH}?ref=${SOURCE_SHA}" \
            -o "${TARGET_PATH}"

      - name: Commit and push if changed
        run: |
          TARGET_PATH="${TARGET_PATH:-api-reference/openapi.json}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${TARGET_PATH}"
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: sync ${TARGET_PATH} from ${SOURCE_REPO}@${SOURCE_SHA}"
          git push
