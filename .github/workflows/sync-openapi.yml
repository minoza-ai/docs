name: Update OpenAPI Spec

on:
  repository_dispatch:
    types: [update-docs]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      - name: Download openapi.json from backend repo
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.raw+json" \
            "https://api.github.com/repos/${{ github.event.client_payload.repo }}/contents/openapi.json?ref=${{ github.event.client_payload.sha }}" \
            -o api-reference/openapi.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api-reference/openapi.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: sync openapi.json from ${{ github.event.client_payload.repo }}@${{ github.event.client_payload.sha }}"
          git push
